<div id="question-box" style="
    position: fixed; 
    bottom: 10vh; 
    left: 50%; 
    transform: translateX(-50%); 
    width: 85%; 
    text-align: center; 
    z-index: 150;
">
    <p id="typing-text" style="
        color: #fff; 
        font-family: 'Segoe UI', Roboto, sans-serif; 
        line-height: 1.8; 
        font-size: 16px; 
        min-height: 3em; /* Giữ chỗ để không bị nhảy khung khi hiện chữ */
        text-shadow: 0 0 5px rgba(255,255,255,0.3);
    "></p>

    <div id="action-buttons" style="
        display: flex; 
        justify-content: center; 
        gap: 20px; 
        margin-top: 25px; 
        opacity: 0; 
        transition: 3s;
    ">
        <button onclick="openLetter()" style="background: transparent; border: 1px solid #fff; color: #fff; padding: 8px 25px; cursor: pointer; font-family: serif;">Tớ cũng đang rảnh...</button>
        <button onclick="skipAll()" style="background: transparent; border: 1px solid rgba(255,255,255,0.4); color: rgba(255,255,255,0.6); padding: 8px 25px; cursor: pointer; font-family: serif;">Có lẽ để sau nhé</button>
    </div>
</div>
<div id="letter-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; justify-content: center; align-items: center; opacity: 0; transition: 2s;">
    <div style="background: #fff; width: 85%; max-width: 450px; padding: 40px; border-radius: 2px; color: #333; font-family: 'Georgia', serif;">
        <h2 style="text-align: center; color: #000; font-weight: normal;">Gửi Huyền...</h2>
        <div style="line-height: 1.8; margin-top: 20px; font-size: 15px;">
            Chào cậu, tớ biết thời gian qua... <br><br>
            Chúc cậu một ngày 31/03 thật bình an.
        </div>
        <p style="text-align: right; margin-top: 40px; font-style: italic;">- Boboi -</p>
    </div>
