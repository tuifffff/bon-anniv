<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/flowers.png" type="image/x-icon">
    <title>cmsn</title>
</head>
<body>
   <div id="action-buttons" style="
        display: flex; 
        justify-content: center; 
        gap: 20px; 
        margin-top: 25px; 
        opacity: 0; 
        transition: 3s;
    ">
        <button onclick="openLetter()" style="background: transparent; border: 1px solid #fff; color: #fff; padding: 8px 25px; cursor: pointer; font-family: serif;">Tớ cũng đang rảnh...</button>
        <button onclick="skipAll()" style="background: transparent; border: 1px solid rgba(255,255,255,0.4); color: rgba(255,255,255,0.6); padding: 8px 25px; cursor: pointer; font-family: serif;">Có lẽ để lúc khác nhé</button>
    </div>
</div>
<div id="letter-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; justify-content: center; align-items: center; opacity: 0; transition: 2s;">
    <div style="background: #fff; width: 85%; max-width: 450px; padding: 40px; border-radius: 2px; color: #333; font-family: 'Georgia', serif;">
        <h2 style="text-align: center; color: #000; font-weight: normal;">Hmm</h2>
        <div style="line-height: 1.8; margin-top: 20px; font-size: 15px;font-family: 'San Francisco', Roboto, 'Helvetica Neue', Arial, sans-serif;">
            Tớ nợ cậu một lời xin lỗi vì trước đó đã hơi vồ vập làm cậu thấy phiền. Tớ vẫn thực sự trân trọng cậu, nma giờ tớ chọn cách để mọi thứ thuận theo tự nhiên. Cứ thong thả nhé, mình vẫn là bạn cũng được mà. Khi nào cậu thấy thoải mái trò chuyện lại thì nhắn tớ sau nhé <br><br>
            Sinh nhật vui vẻ
        </div>
    </div>
</div>
</body>
</html>
