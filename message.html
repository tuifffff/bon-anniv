<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/flowers.png" type="image/x-icon">
    <title>cmsn</title>
</head>
<body>
   <button id="btn-message" onclick="openLetter()" style="opacity: 0; position: fixed; bottom: 10vh; left: 50%; transform: translateX(-50%); background: transparent; border: 1px solid #fff; color: #fff; padding: 10px 20px; cursor: pointer; transition: 2s; font-family: 'Courier New', Courier, monospace; letter-spacing: 1px; z-index: 100;">TỚ CŨNG RẢNH...</button>

<div id="letter" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; justify-content: center; align-items: center; opacity: 0; transition: 2s;">
    <div style="background: #fff; width: 80%; max-width: 400px; padding: 40px; border-radius: 5px; box-shadow: 0 0 20px rgba(255,255,255,0.2); font-family: 'Georgia', serif; line-height: 1.6; color: #333;">
        <h3 style="text-align: center; color: #000;">Gửi Huyền...</h3>
        <p><i>(Cậu viết những lời xin lỗi hoặc tâm sự của cậu vào đây nhé. Phong cách nhẹ nhàng, chân thành của dân IT dành cho cô giáo Văn là chuẩn bài luôn!)</i></p>
        <p style="text-align: right; margin-top: 30px;">- Boboi -</p>
    </div>
</div>
